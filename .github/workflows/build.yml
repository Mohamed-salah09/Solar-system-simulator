name: C++ Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install SFML
      run: |
        sudo apt update
        sudo apt install -y libsfml-dev

    - name: Build Project
      run: |
        g++ src/main.cpp src/planet.cpp \
        -Iheader \
        -o solar-system \
        -lsfml-graphics \
        -lsfml-window \
        -lsfml-system